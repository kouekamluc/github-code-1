services:
  postgres:
    image: postgres:16-alpine
    container_name: cameroon_phone_monitor_db
    environment:
      POSTGRES_DB: cameroon_stats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cameroon_stats"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
